name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .claude/**
      - .omc/**
      - .gitignore

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: docker.test4x.com
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=registry,ref=docker.test4x.com/xgfan/gallery:buildcache
          cache-to: type=registry,ref=docker.test4x.com/xgfan/gallery:buildcache,mode=max
          tags: |
            docker.test4x.com/xgfan/gallery:${{ env.TAG }}
            docker.test4x.com/xgfan/gallery:latest
